name: 振宇班次提醒

on:
  schedule:
    # 每天 19:00 CST = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 检测腾讯文档连通性
        run: |
          curl -sI --max-time 15 "https://docs.qq.com" | head -5 || echo "WARNING: docs.qq.com 可能不可达"

      - name: 查询并发送班次提醒
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_*: ${{ secrets.DINGTALK_* }}
        run: python check_shift.py
